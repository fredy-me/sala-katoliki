name: salakatoliki
description: "Offline-first Catholic prayer app for English and Kiswahili."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.6+6

environment:
  sdk: ^3.10.4


dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  easy_localization: ^3.0.8
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  share_plus: ^13.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

 
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter



# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/logo/
    - assets/content/categories/
    - assets/content/prayers/en/
    - assets/content/prayers/sw/
    - assets/content/novenas/en/
    - assets/content/novenas/sw/
    - assets/content/rosary/en/
    - assets/content/rosary/sw/
    - assets/content/metadata/
